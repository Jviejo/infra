services:

  # ---------------------------------------------------------------------------
  # TRAEFIK - Reverse proxy & load balancer
  # ---------------------------------------------------------------------------
  traefik:
    image: ${TRAEFIK_IMAGE}
    container_name: traefik
    restart: unless-stopped
    command:
      - --log.level=${TRAEFIK_LOG_LEVEL}
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    ports:
      - "${TRAEFIK_HTTP_PORT}:80"
      - "${TRAEFIK_HTTPS_PORT}:443"
      - "${TRAEFIK_DASHBOARD_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.${BASE_DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=web
      - traefik.http.services.traefik.loadbalancer.server.port=8080

  # ---------------------------------------------------------------------------
  # POSTGRES
  # ---------------------------------------------------------------------------
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MONGODB
  # ---------------------------------------------------------------------------
  mongodb:
    image: ${MONGODB_IMAGE}
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGODB_PORT}:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # REDIS
  # ---------------------------------------------------------------------------
  redis:
    image: ${REDIS_IMAGE}
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # RUSTFS - S3-compatible object storage
  # ---------------------------------------------------------------------------
  rustfs:
    image: ${RUSTFS_IMAGE}
    container_name: rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD}
    ports:
      - "${RUSTFS_PORT_API}:9000"
      - "${RUSTFS_PORT_CONSOLE}:9001"
    volumes:
      - rustfs-data:/data
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      # API
      - traefik.http.routers.rustfs-api.rule=Host(`s3.${BASE_DOMAIN}`)
      - traefik.http.routers.rustfs-api.entrypoints=web
      - traefik.http.routers.rustfs-api.service=rustfs-api-svc
      - traefik.http.services.rustfs-api-svc.loadbalancer.server.port=9000
      # Console
      - traefik.http.routers.rustfs-console.rule=Host(`rustfs.${BASE_DOMAIN}`)
      - traefik.http.routers.rustfs-console.entrypoints=web
      - traefik.http.routers.rustfs-console.service=rustfs-console-svc
      - traefik.http.services.rustfs-console-svc.loadbalancer.server.port=9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # MAILHOG - SMTP dev server + web UI
  # ---------------------------------------------------------------------------
  mailhog:
    image: ${MAILHOG_IMAGE}
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT}:1025"
      - "${MAILHOG_UI_PORT}:8025"
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.mailhog.rule=Host(`mail.${BASE_DOMAIN}`)
      - traefik.http.routers.mailhog.entrypoints=web
      - traefik.http.services.mailhog.loadbalancer.server.port=8025

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  proxy:
    name: proxy
    driver: bridge
  internal:
    name: internal
    driver: bridge
    internal: true

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres-data:
  mongodb-data:
  mongodb-config:
  redis-data:
  rustfs-data:
  traefik-certs:
